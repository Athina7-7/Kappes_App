<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <!-- BOOTSTRAP CSS: utilidades (d-flex, justify-content-*, etc.) y estilos base -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

     <!-- BOOTSTRAP ICONS: paquete de íconos (ej: bi bi-plus-lg) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    
    

<style>@import url("css/pagina-inicio.css?v=3");</style>

</head>
<body>
    <!--Barra superior-->
    <!-- ka-header = estilos propios; 
         px-4 = padding horizontal de Bootstrap;
         d-flex = usa Flexbox;
         align-items-center = centra verticalmente los hijos;
         justify-content-between = separa extremos (izq/der) -->
    <header class="ka-header px-4 d-flex align-items-center justify-content-between">


        <!-- Botón hamburguesa (boton menu) -->
        <button class="ka-hamburger" aria-label="Abrir menú">
            <span></span><span></span><span></span>
        </button>

        <!-- Logo y texto -->
         <!-- d-flex flex-column = apila verticalmente;
             align-items-center = centra horizontalmente los hijos -->
        <div class="ka-brand d-flex flex-column align-items-center">

            <img src="img/logo-kappe.png" alt="Kappe's App" class="ka-logo">
        </div>

    </header>

    <!--Contenido central-->

    <!-- d-flex + flex-column + align-items-center + justify-content-center:
         Centra el contenido tanto vertical como horizontalmente;
         text-center centra el texto -->
    <main class="ka-main d-flex flex-column align-items-center justify-content-center text-center">
        <h1 class="ka-title">Agregar mesa</h1>
        <button class="ka-add-btn" aria-label="Agregar mesa">

            <!-- Ícono de Bootstrap Icons (no es imagen, es fuente de iconos) -->
  <i class="bi bi-plus-lg"></i>
</button>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
</body>

</html>
