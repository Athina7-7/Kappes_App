<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/pagina-inicio.css" />
</head>
<body>
    <div class="ka-overlay"></div>
      <!-- Menú cargado dinámicamente -->
    <div id="menu-container"></div>


  <!-- Contenido principal -->
  <main class="ka-main text-center">
    <h1 class="ka-title">Agregar mesa</h1>
    <button class="ka-add-btn" aria-label="Agregar mesa">
      <i class="bi bi-plus-lg"></i>
    </button>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/menu-hambur.js"></script>
    <script>
    fetch("menu.html")
        .then(response => response.text())
        .then(data => {
        document.getElementById("menu-container").innerHTML = data;
        activarMenuHamburguesa(); // ⬅️ Llamas la función cuando el menú ya está cargado
        });
    </script>

</body>
</html>
